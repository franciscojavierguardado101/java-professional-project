spring.application.name=spring-boot-api

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
# Uses environment variables in production (Railway injects these automatically)
# Falls back to local values during development
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jobboard_dev}
spring.datasource.username=${DB_USERNAME:franciscoguardado}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# ddl-auto options:
#   create-drop  = wipe and recreate tables on every restart (use in early dev)
#   update       = add new columns/tables but never delete (use when you have data)
#   validate     = check schema matches entities but make no changes (use in prod)
#   none         = do nothing (use in prod with Flyway/Liquibase migrations)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── CORS (allows Next.js frontend to call this API) ─────────────────────────
# We will configure this properly in a CorsConfig class later

# ─── Actuator (health check for Railway) ─────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.jobboard=DEBUG
logging.level.org.springframework.web=INFO
