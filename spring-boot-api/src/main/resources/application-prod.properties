# ─── Production overrides (activated on Railway via SPRING_PROFILES_ACTIVE=prod) ──

# Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automatically
# when a PostgreSQL service is linked to this service
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Schema is stable — never wipe data in production
spring.jpa.hibernate.ddl-auto=update

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.jobboard=INFO
logging.level.org.springframework.web=WARN
