# ─── Production overrides (activated on Railway via SPRING_PROFILES_ACTIVE=prod) ──

# Railway injects DATABASE_URL automatically when PostgreSQL is linked
# Format from Railway: postgresql://user:pass@host:port/db
# We prefix with jdbc: to make it a valid JDBC connection string
spring.datasource.url=jdbc:${DATABASE_URL}

# Schema is stable — never wipe data in production
spring.jpa.hibernate.ddl-auto=update

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.jobboard=INFO
logging.level.org.springframework.web=WARN
