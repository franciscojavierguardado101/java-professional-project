# ─── Production overrides (activated on Railway via SPRING_PROFILES_ACTIVE=prod) ──

# Railway injects these from the linked Postgres service
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set dialect so Hibernate doesn't need to auto-detect it
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schema is stable — never wipe data in production
spring.jpa.hibernate.ddl-auto=update

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.jobboard=INFO
logging.level.org.springframework.web=WARN
