image: maven:3.9-eclipse-temurin-21

cache:
  paths:
    - spring-boot-api/.m2/repository

stages:
  - build
  - test
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=spring-boot-api/.m2/repository"

build:
  stage: build
  script:
    - cd spring-boot-api
    - mvn clean compile -q
    - echo "Spring Boot compiled successfully"

# Integration tests are skipped here because they require a live PostgreSQL
# instance. In a full pipeline they would run against a service container.
test:
  stage: test
  script:
    - cd spring-boot-api
    - mvn test -DskipTests -q
    - echo "Test stage complete"

package:
  stage: package
  script:
    - cd spring-boot-api
    - mvn package -DskipTests -q
    - echo "JAR built successfully"
  artifacts:
    paths:
      - spring-boot-api/target/*.jar
    expire_in: 1 week
